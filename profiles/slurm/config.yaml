# Snakemake SLURM profile — FAU KoKo HPC
#
# Before running, fill in:
#   slurm_account: your-koko-account   (e.g. ecos or your PI's group)
#   singularity-args: add your scratch path (e.g. --bind /blue/yourgroup)
#
# KoKo partitions: general (4h), himem (large mem), gpu
# Request himem partition for Segment 4 (SAF, 96 samples x 3GB each)
#
# Usage:
#   bash scripts/run_segment.sh <segment> --profile slurm
#
# Data must be staged to scratch before running — see NEXT_STEPS.md

executor: slurm
jobs: 40
use-singularity: true
singularity-args: "--bind /home --bind /blue --bind /scratch --bind /tmp"
default-resources:
  slurm_partition: "general"
  slurm_account: "FILL_IN_YOUR_ACCOUNT"
  mem_mb: 32000
  runtime: 240
  cpus_per_task: 4
keep-going: true
latency-wait: 120
rerun-incomplete: true
rerun-triggers:
  - mtime
scheduler: greedy
